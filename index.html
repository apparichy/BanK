<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BanK - Money Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #eee; min-height: 100vh; }
    header { background: #1a1a2e; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #4ade80; }
    header h1 { font-size: 1.8rem; color: #4ade80; letter-spacing: 2px; }
    #auth-section { text-align: center; padding: 4rem 1rem; }
    #auth-section h2 { margin-bottom: 1rem; color: #4ade80; }
    .btn { background: #4ade80; color: #0f0f0f; border: none; padding: 0.6rem 1.4rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn:hover { background: #22c55e; }
    .btn-outline { background: transparent; border: 2px solid #4ade80; color: #4ade80; }
    .btn-outline:hover { background: #4ade80; color: #0f0f0f; }
    input, select { background: #1e1e1e; border: 1px solid #333; color: #eee; padding: 0.5rem 0.8rem; border-radius: 6px; width: 100%; font-size: 0.95rem; }
    input:focus, select:focus { outline: none; border-color: #4ade80; }
    #main-app { display: none; max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .card { background: #1a1a2e; border-radius: 10px; padding: 1.2rem; text-align: center; }
    .card .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
    .card .value { font-size: 1.6rem; font-weight: bold; }
    .card.income .value { color: #4ade80; }
    .card.expense .value { color: #f87171; }
    .card.balance .value { color: #60a5fa; }
    .section-title { font-size: 1.1rem; font-weight: bold; color: #4ade80; margin: 1.5rem 0 0.8rem; border-bottom: 1px solid #333; padding-bottom: 0.4rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label { font-size: 0.82rem; color: #aaa; }
    .form-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; margin-top: 0.4rem; }
    .entries-list { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.5rem; }
    .entry-item { background: #1a1a2e; border-radius: 8px; padding: 0.8rem 1rem; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid transparent; }
    .entry-item.income { border-left-color: #4ade80; }
    .entry-item.expense { border-left-color: #f87171; }
    .entry-info .desc { font-weight: 600; }
    .entry-info .meta { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .entry-amount { font-size: 1.1rem; font-weight: bold; }
    .entry-amount.income { color: #4ade80; }
    .entry-amount.expense { color: #f87171; }
    .entry-actions { display: flex; gap: 0.5rem; margin-left: 1rem; }
    .entry-actions button { background: none; border: none; cursor: pointer; color: #888; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
    .entry-actions button:hover { color: #eee; background: #333; }
    .filter-bar { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #4ade80; color: #0f0f0f; padding: 0.7rem 1.2rem; border-radius: 8px; font-weight: bold; display: none; z-index: 999; }
    #toast.error { background: #ef4444; color: #fff; }
    .empty-state { text-align: center; color: #555; padding: 2rem; }
    @media (max-width: 600px) { .summary-cards { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <h1>BanK</h1>
  <div id="user-info" style="display:none;gap:0.8rem;align-items:center;">
    <span id="user-email" style="color:#aaa;font-size:0.85rem"></span>
    <button class="btn btn-outline" onclick="signOut()">Sign Out</button>
  </div>
</header>
<div id="auth-section">
  <h2>Sign in to BanK</h2>
  <p style="color:#888;margin-bottom:1.5rem">Track your income and expenses securely.</p>
  <div style="max-width:360px;margin:0 auto;display:flex;flex-direction:column;gap:0.8rem">
    <div class="form-group"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" /></div>
    <div class="form-group"><label>Password</label><input type="password" id="auth-password" placeholder="Password" /></div>
    <div style="display:flex;gap:0.8rem">
      <button class="btn" style="flex:1" onclick="signIn()">Sign In</button>
      <button class="btn btn-outline" style="flex:1" onclick="signUp()">Sign Up</button>
    </div>
  </div>
</div>
<div id="main-app">
  <div class="summary-cards">
    <div class="card income"><div class="label">Total Income</div><div class="value" id="total-income">$0.00</div></div>
    <div class="card expense"><div class="label">Total Expenses</div><div class="value" id="total-expenses">$0.00</div></div>
    <div class="card balance"><div class="label">Balance</div><div class="value" id="balance">$0.00</div></div>
  </div>
  <div class="section-title">Add Entry</div>
  <div class="form-grid">
    <div class="form-group"><label>Type</label><select id="entry-type"><option value="expense">Expense</option><option value="income">Income</option></select></div>
    <div class="form-group"><label>Amount ($)</label><input type="number" id="entry-amount" placeholder="0.00" min="0.01" step="0.01" /></div>
    <div class="form-group"><label>Category</label><input type="text" id="entry-category" placeholder="e.g. Food, Salary" /></div>
    <div class="form-group"><label>Date</label><input type="date" id="entry-date" /></div>
    <div style="grid-column:1/-1" class="form-group"><label>Description</label><input type="text" id="entry-desc" placeholder="What was this for?" /></div>
    <div class="form-actions"><button class="btn" onclick="saveEntry()">Add Entry</button></div>
  </div>
  <div class="section-title">Transactions</div>
  <div class="filter-bar">
    <select id="filter-type" onchange="loadEntries()"><option value="">All Types</option><option value="income">Income</option><option value="expense">Expense</option></select>
    <input type="month" id="filter-month" onchange="loadEntries()" style="width:auto" />
  </div>
  <div id="entries-list"><div class="empty-state">Loading...</div></div>
</div>
<div id="toast"></div>
<script>
  var SUPABASE_URL = 'https://lxfpesgazzaevcfzivse.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZnBlc2dhenphZXZjZnppdnNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NzYxNzIsImV4cCI6MjA5ODM1MjE3Mn0.MdeaSu2VPnEDCyKZztl1BJTF8Gw1PsK-vr1jqp1LYHs';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  var currentUser = null;
  var editingId = null;

  document.getElementById('entry-date').valueAsDate = new Date();

  sb.auth.onAuthStateChange(function(event, session) {
    if (session && session.user) {
      currentUser = session.user;
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      document.getElementById('user-info').style.display = 'flex';
      document.getElementById('user-email').textContent = currentUser.email;
      loadEntries();
    } else {
      currentUser = null;
      document.getElementById('auth-section').style.display = 'block';
      document.getElementById('main-app').style.display = 'none';
      document.getElementById('user-info').style.display = 'none';
    }
  });

  function signIn() {
    var email = document.getElementById('auth-email').value.trim();
    var pass = document.getElementById('auth-password').value;
    sb.auth.signInWithPassword({ email: email, password: pass }).then(function(r) {
      r.error ? showToast(r.error.message, true) : showToast('Signed in!');
    });
  }

  function signUp() {
    var email = document.getElementById('auth-email').value.trim();
    var pass = document.getElementById('auth-password').value;
    sb.auth.signUp({ email: email, password: pass }).then(function(r) {
      r.error ? showToast(r.error.message, true) : showToast('Check email to confirm!');
    });
  }

  function signOut() { sb.auth.signOut(); }

  function loadEntries() {
    if (!currentUser) return;
    var tf = document.getElementById('filter-type').value;
    var mf = document.getElementById('filter-month').value;
    var q = sb.from('entries').select('*').order('date', { ascending: false }).order('created_at', { ascending: false });
    if (tf) q = q.eq('type', tf);
    if (mf) {
      var p = mf.split('-');
      var endDate = new Date(parseInt(p[0]), parseInt(p[1]), 0).toISOString().split('T')[0];
      q = q.gte('date', p[0] + '-' + p[1] + '-01').lte('date', endDate);
    }
    q.then(function(r) {
      if (r.error) { showToast(r.error.message, true); return; }
      renderEntries(r.data);
      updateSummary(r.data);
    });
  }

  function buildRow(e) {
    var row = document.createElement('div');
    row.className = 'entry-item ' + e.type;
    var info = document.createElement('div');
    info.className = 'entry-info';
    var d = document.createElement('div');
    d.className = 'desc';
    d.textContent = e.description || e.category;
    var m = document.createElement('div');
    m.className = 'meta';
    m.textContent = e.category + ' - ' + e.date;
    info.appendChild(d);
    info.appendChild(m);
    var right = document.createElement('div');
    right.style.cssText = 'display:flex;align-items:center';
    var amt = document.createElement('div');
    amt.className = 'entry-amount ' + e.type;
    amt.textContent = (e.type === 'income' ? '+' : '-') + '$' + parseFloat(e.amount).toFixed(2);
    var acts = document.createElement('div');
    acts.className = 'entry-actions';
    var eb = document.createElement('button');
    eb.textContent = 'Edit';
    eb.setAttribute('data-id', e.id);
    eb.onclick = function() { editEntry(this.getAttribute('data-id')); };
    var db = document.createElement('button');
    db.textContent = 'Del';
    db.style.color = '#f87171';
    db.setAttribute('data-id', e.id);
    db.onclick = function() { deleteEntry(this.getAttribute('data-id')); };
    acts.appendChild(eb);
    acts.appendChild(db);
    right.appendChild(amt);
    right.appendChild(acts);
    row.appendChild(info);
    row.appendChild(right);
    return row;
  }

  function renderEntries(entries) {
    var list = document.getElementById('entries-list');
    list.innerHTML = '';
    if (!entries || entries.length === 0) {
      list.innerHTML = '<div class="empty-state">No transactions yet.</div>';
      return;
    }
    var wrap = document.createElement('div');
    wrap.className = 'entries-list';
    for (var i = 0; i < entries.length; i++) {
      wrap.appendChild(buildRow(entries[i]));
    }
    list.appendChild(wrap);
  }

  function updateSummary(entries) {
    var inc = 0, exp = 0;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i].type === 'income') inc += parseFloat(entries[i].amount);
      else exp += parseFloat(entries[i].amount);
    }
    document.getElementById('total-income').textContent = '$' + inc.toFixed(2);
    document.getElementById('total-expenses').textContent = '$' + exp.toFixed(2);
    var b = inc - exp;
    var el = document.getElementById('balance');
    el.textContent = '$' + Math.abs(b).toFixed(2);
    el.style.color = b >= 0 ? '#60a5fa' : '#f87171';
  }

  function saveEntry() {
    var type = document.getElementById('entry-type').value;
    var amount = parseFloat(document.getElementById('entry-amount').value);
    var category = document.getElementById('entry-category').value.trim();
    var date = document.getElementById('entry-date').value;
    var desc = document.getElementById('entry-desc').value.trim();
    if (!amount || amount <= 0) { showToast('Enter a valid amount', true); return; }
    if (!category) { showToast('Category is required', true); return; }
    if (!date) { showToast('Date is required', true); return; }
    var entry = { type: type, amount: amount, category: category, date: date, description: desc || null, user_id: currentUser.id };
    var p = editingId ? sb.from('entries').update(entry).eq('id', editingId) : sb.from('entries').insert(entry);
    p.then(function(r) {
      if (r.error) { showToast(r.error.message, true); return; }
      showToast(editingId ? 'Updated!' : 'Added!');
      editingId = null;
      clearForm();
      loadEntries();
    });
  }

  function clearForm() {
    document.getElementById('entry-type').value = 'expense';
    document.getElementById('entry-amount').value = '';
    document.getElementById('entry-category').value = '';
    document.getElementById('entry-date').valueAsDate = new Date();
    document.getElementById('entry-desc').value = '';
  }

  function editEntry(id) {
    sb.from('entries').select('*').eq('id', id).single().then(function(r) {
      if (r.error) { showToast(r.error.message, true); return; }
      editingId = id;
      document.getElementById('entry-type').value = r.data.type;
      document.getElementById('entry-amount').value = r.data.amount;
      document.getElementById('entry-category').value = r.data.category;
      document.getElementById('entry-date').value = r.data.date;
      document.getElementById('entry-desc').value = r.data.description || '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showToast('Editing - update and click Add Entry');
    });
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    sb.from('entries').delete().eq('id', id).then(function(r) {
      if (r.error) { showToast(r.error.message, true); return; }
      showToast('Deleted');
      loadEntries();
    });
  }

  function showToast(msg, isError) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error' : '';
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>
